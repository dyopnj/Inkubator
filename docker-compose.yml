services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: chickhub-mqtt
    ports:
      - "1883:1883"   # MQTT
      - "9001:9001"   # WebSocket
    volumes:
      - ./mosquitto.chickhub.conf:/mosquitto/config/mosquitto.conf:ro
      - mqtt_data:/mosquitto/data
      - mqtt_log:/mosquitto/log
    restart: unless-stopped

  server:
    build: .
    container_name: chickhub-server
    ports:
      - "3000:3000"
    environment:
      - MQTT_HOST=mosquitto
      - MQTT_PORT=1883
    volumes:
      - chickhub_data:/app/data
    depends_on:
      - mosquitto
    restart: unless-stopped

volumes:
  mqtt_data:
  mqtt_log:
  chickhub_data:
